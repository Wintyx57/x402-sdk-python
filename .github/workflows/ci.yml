name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint with ruff
        run: ruff check x402_bazaar/

      - name: Type check with mypy
        run: mypy x402_bazaar/ --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        run: pytest tests/ -m "not integration" -v --tb=short

      - name: Run integration tests
        run: pytest tests/ -m integration -v --tb=short
        continue-on-error: true  # Integration tests depend on external backend
